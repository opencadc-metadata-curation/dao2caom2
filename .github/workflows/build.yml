name: OpenCADC DAO2CAOM2 Docker CI

env:
  # Allow the set-env command below
  ACTIONS_ALLOW_UNSECURE_COMMANDS: true

on:
  pull_request:
  push:
  release:

jobs:
  #
  # Package jobs
  #
  docker-build-publish-audit-tools:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v4
      -
        name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.CI_REGISTRY_USER }}
          password: ${{ secrets.CI_REGISTRY_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64 # Only amd64 is supported.
          push: true
          tags: ${{ vars.CI_REGISTRY_IMAGE_TAG }}
#
# End Package Jobs
#
